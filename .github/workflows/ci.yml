name: CI

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SITE_URL: https://example.com
      JWT_SECRET: 0123456789abcdef0123456789abcdef

      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Run CI against the PR head commit so checks stay signal-focused on branch
          # changes even when the PR has temporary merge conflicts with base.
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Enforce public npm registry
        run: |
          npm config set registry https://registry.npmjs.org/
          npm config delete proxy || true
          npm config delete https-proxy || true

      - name: Check package.json format
        run: npm run check:package-json

      - name: Install dependencies
        run: npm install --include=dev

      - name: Check dependency alignment
        run: npm run check:deps

      - name: Check conflict markers
        run: npm run check:conflicts
      - name: Validate package.json
        run: npm run check:package-json


      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Verify locked framework versions
        run: npm run check:deps

      - name: Check conflict markers
        run: |
          chmod +x ./scripts/check-conflict-markers.sh
          ./scripts/check-conflict-markers.sh
      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
